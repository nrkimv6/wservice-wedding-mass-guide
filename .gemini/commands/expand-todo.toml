description = "TODO 체크리스트를 2단계 원자 작업으로 확장. Use when: 확장, expand, 체크리스트 확장, todo 확장, 구체화"

prompt = """
# TODO 확장

선택된/요청받은 계획을 보다 상세한 2레벨의 원자 작업들로 구체화시킵니다.

## Workflow

### 1단계: plan 읽기

- 대상 계획 문서를 찾아서 오픈합니다 (`.worktrees/plans/docs/plan/{file}`).
- 사용자의 지정 혹은 검색 조건과 매칭시켜 기존에 작성된 Phase 및 체크리스트의 깊이/구조를 파악합니다.

### 2단계: 코드 분석

- 각 항목별 대상 파일 Read를 통해 적용될 파일베이스를 탐색합니다.
- 함수/클래스의 현재 구현 내용을 확인하고, 기존 패턴 가이드 및 현재 임포트 등을 파악하여 변경 청사진을 도출합니다.

### 2.5단계: main 드리프트 게이트 점검

- `기준커밋`이 있으면 `git diff --name-only {기준커밋}..main`으로 변경 파일을 확인합니다.
- `기준커밋`이 없으면 `작성일시` 기반 `git log --since`를 fallback으로 사용합니다.
- 둘 다 없으면 최근 main 변경을 탐색하고 `영향 없음` 근거를 기록합니다.
- archive/history 문서는 의도 해석에만 사용하고, 최종 반영 판정은 git 결과로 확정합니다.
- 교집합이 없어도 수정 대상 파일별 `git diff`를 확인합니다.
- strict 조건(`fix`, 공통 모듈/API/DB, 대규모 변경)이면 `전수 검색 -> 선별 Read`를 적용합니다.

### 3단계: 2레벨 분해

상위 수준의 작업 목표(1레벨) 아래 구체적 대상 파일의 수정 사항(2레벨)을 배치합니다.

**규칙:**
- 2레벨 등 하위 트리는 필수적으로 `- [ ]` 형식의 체크박스를 작성합니다.
- 단위 상위 파이프라인 아래 2레벨 하위 체크를 5개 이상 구성해야 한다면, 독립적인 새로운 Phase로 단계를 승격시켜야 합니다.
- 드리프트 결과는 `추가 TODO` 또는 `기술적 고려사항`으로만 반영하고, `archive-only`/`git-only` 분기와 근거를 함께 기록합니다.

### 4단계: 문서 업데이트

기존에 자리한 두루뭉술한 체크리스트 파트를 Edit Tool을 이용하여 새로 구성한 구체적 트리 라인 단위로 교체합니다.

**주의:** plan 헤더 블록쿼트(요약 포함)를 삭제하거나 수정하지 않는다. 체크리스트 섹션만 교체한다.

{{args}}
"""
